<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utine — Timebox + Pomodoro Sequence Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #E8E4DF;
      color: #2C2C2E;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .accent { color: #E85D2C; }
    .tagline {
      font-size: 18px;
      color: #7A7673;
      margin-bottom: 32px;
    }
    .desc {
      font-size: 15px;
      color: #2C2C2E;
      margin-bottom: 40px;
    }
    .features {
      list-style: none;
      text-align: left;
      margin-bottom: 40px;
    }
    .features li {
      font-size: 15px;
      padding: 8px 0;
      border-bottom: 1px solid #DDD9D4;
    }
    .features li:last-child { border-bottom: none; }
    .features li::before {
      content: '—';
      color: #E85D2C;
      margin-right: 8px;
    }
    .badge-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      padding: 12px 24px;
      background: #2C2C2E;
      color: #F0ECE8;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .badge:hover { background: #3C3C3E; }
    .badge.soon {
      background: #A8A4A0;
      cursor: default;
    }
    footer {
      margin-top: 48px;
      font-size: 13px;
      color: #A8A4A0;
    }
    footer a {
      color: #7A7673;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">U<span class="accent">.</span>tine</div>
    <p class="tagline">Timebox + Pomodoro Sequence Timer</p>
    <p class="desc">
      하루의 중요한 일 3가지에 집중하고,<br>
      나만의 뽀모도로 시퀀스로 실행하세요.<br>
      못 해도 괜찮은, guilt-free 생산성.
    </p>
    <ul class="features">
      <li>Major 3 + Minor 체크리스트로 하루 구조화</li>
      <li>커스텀 뽀모도로 시퀀스 타이머</li>
      <li>Google Calendar 연동</li>
      <li>스트릭 & 성취 트래킹</li>
      <li>Neumorphic Industrial 디자인</li>
    </ul>
    <div class="badge-group">
      <span class="badge soon">App Store — Coming Soon</span>
    </div>
    <footer>
      <a href="/utine-web/privacy.html">개인정보 처리방침</a> ·
      <a href="mailto:richharvestcc@gmail.com">문의</a>
      <br><br>
      &copy; 2026 RichHarvest
    </footer>
  </div>
</body>
</html>
